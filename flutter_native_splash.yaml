flutter_native_splash:
  # Dark navy background matching AppConfig.splashBackgroundColor
  color: "#00131F"
  image: assets/logo.png

  # Android 12+ uses a separate splash API
  android_12:
    color: "#00131F"
    image: assets/logo.png
    icon_background_color: "#00131F"

  # Disable web splash (mobile-only app)
  web: false
