name: tt_mobile_app
description: "Troop Tracker mobile app for the Florida Garrison."
publish_to: 'none'

version: 1.1.6+7

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # WebView
  webview_flutter: ^4.10.0

  # External URL handling
  url_launcher: ^6.3.1

  # App version display in Settings
  package_info_plus: ^8.0.0

  # Native splash screen
  flutter_native_splash: ^2.4.0

  # Camera / photo permissions for WebView file uploads
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#00131F"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/app_icon.png
    - assets/icons/501.png
    - assets/icons/bluestar.png
    - assets/icons/everglades_icon.png
    - assets/icons/garrison_icon.png
    - assets/icons/makaze_icon.png
    - assets/icons/parjai_icon.png
    - assets/icons/squad7_icon.png
    - assets/icons/tampabay_icon.png
